<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#111"/>
  <!-- Photo frame -->
  <rect x="4" y="7" width="24" height="18" rx="3" fill="none" stroke="#e0e0e0" stroke-width="1.8"/>
  <!-- Lens circle -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#e0e0e0" stroke-width="1.6"/>
  <circle cx="16" cy="16" r="2.2" fill="#e0e0e0" opacity="0.6"/>
  <!-- Flash bump -->
  <rect x="12" y="4.5" width="8" height="3" rx="1.5" fill="#e0e0e0" opacity="0.85"/>
  <!-- Corner notch decoration -->
  <circle cx="7.5" cy="10.5" r="1" fill="#e0e0e0" opacity="0.4"/>
</svg>
